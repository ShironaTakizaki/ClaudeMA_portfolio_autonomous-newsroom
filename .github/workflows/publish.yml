name: Daily Publish

on:
  schedule:
    - cron: '0 9 * * *'   # 09:00 UTC daily
  workflow_dispatch:        # allow manual trigger

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic

      - name: Run publish pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        working-directory: src
        run: python main.py publish

      - name: Commit new article
        run: |
          git config user.name  "autonomous-publisher"
          git config user.email "noreply@github.com"
          git add articles/
          git add knowledge/zen_index.md
          git diff --staged --quiet || git commit -m "publish: daily article $(date -u +%Y-%m-%d)"
          git push
