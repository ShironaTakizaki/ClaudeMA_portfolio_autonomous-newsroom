name: ZEN Cycle

on:
  schedule:
    - cron: '0 */6 * * *'  # every 6 hours
  workflow_dispatch:

jobs:
  zen:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic

      - name: Run ZEN cycle
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        working-directory: src
        run: python main.py zen

      - name: Commit ZEN updates
        run: |
          git config user.name  "autonomous-publisher"
          git config user.email "noreply@github.com"
          git add knowledge/zen_index.md
          git diff --staged --quiet || git commit -m "zen: cycle $(date -u +%Y-%m-%dT%H:%M)"
          git push
