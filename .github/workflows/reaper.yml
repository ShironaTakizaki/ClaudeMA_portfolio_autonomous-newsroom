name: Reaper

on:
  schedule:
    - cron: '0 1 * * *'   # 01:00 UTC daily
  workflow_dispatch:

jobs:
  reap:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Reap expired articles
        working-directory: src
        run: python ttl.py

      - name: Commit deletions
        run: |
          git config user.name  "autonomous-publisher"
          git config user.email "noreply@github.com"
          git add articles/
          git diff --staged --quiet || git commit -m "reap: expired articles $(date -u +%Y-%m-%d)"
          git push
