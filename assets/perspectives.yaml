perspectives:
  - id: structural
    label: 構造視点
    prompt_hint: "文書の論理構造・章立て・情報の流れを評価する。主張と根拠の対応、節の順序の合理性、繰り返しや欠落を指摘する"

  - id: reader
    label: 読者視点
    prompt_hint: "想定読者が初読で理解できるかを評価する。専門用語の説明有無、文章の平易さ、読者にとっての価値が明確かを確認する"

  - id: critical
    label: 批判視点
    prompt_hint: "主張の弱点・反証可能性を積極的に探す。前提の妥当性・例外ケース・反論に対する耐性を評価する"

  - id: poetic
    label: 皮肉的詩視点
    prompt_hint: "言葉が美徳として読まれながら同時に皮肉として機能しているかを評価する。八方美人的な記述（全員が同意できる・誰も傷つけない）を摘発し、賛否両論を誘発する構造的緊張が埋め込まれているかを確認する。具体に落とし込みすぎて抽象の刃が鈍っていないか——言葉が説明でなく体験として、体験でなく問いとして機能しているかを問う。タイトルから末尾まで同一の皮肉の文脈が貫かれているか"
    require_release_level: [medium, high]
